version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: hr-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: hr_system
      MYSQL_USER: hr_user
      MYSQL_PASSWORD: hr_password
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

  # Redis缓存
  redis:
    image: redis:7.0
    container_name: hr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: hr-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: always

  # HR应用服务
  hr-app:
    build: .
    container_name: hr-app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hr_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
    restart: always

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data: